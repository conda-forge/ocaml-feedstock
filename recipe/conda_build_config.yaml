zip_keys:                      # [not unix]
  - [c_compiler, c_compiler_version]  # [not unix]
c_compiler:                    # [not unix]
  - vs2022                     # [not unix]
  - gcc                        # [not unix]
  - zig                        # [not unix]
c_compiler_version:            # [not unix]
  - "2022"                     # [not unix]
  - "14"                       # [not unix]
  - "0.15.2"                   # [not unix]
c_stdlib:
  - sysroot                    # [linux]
  - vs                         # [not unix]
c_stdlib_version:
  - "2.17"                     # [linux]
  - "2022.14"                  # [not unix]
m2w64_c_stdlib:                # [not unix]
  - m2w64-sysroot              # [not unix]
m2w64_c_stdlib_version:        # [not unix]
  - 12                         # [not unix]
vc:                            # [not unix]
  - 14                         # [not unix]

cross_target_platform_:
  - linux-64
  - linux-aarch64
  - linux-ppc64le
  - osx-64
  - osx-arm64
  - win-64
  - win-arm64

ocaml_compiler:
  - ocaml
ocaml_compiler_version:
  - "5.4.0"

zig_compiler:
  - zig
zig_compiler_version:
  - "0.15.2"
