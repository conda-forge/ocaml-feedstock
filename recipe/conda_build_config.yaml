c_compiler:                    # [not unix]
  - vs2022                     # [not unix]
  - gcc                        # [not unix]
c_stdlib:
  - sysroot                    # [linux]
c_stdlib_version:
  - "2.17"                     # [linux]
m2w64_c_stdlib:                # [not unix]
  - m2w64-sysroot              # [not unix]
m2w64_c_stdlib_version:        # [not unix]
  - 12                         # [not unix]
vc:                            # [not unix]
  - 14                         # [not unix]

# compiler("ocaml") resolves to ocaml-compiler metapackage which includes
# c-compiler + lld (macOS) + ocaml_$platform. Downstream recipes should use
# ${{ compiler("ocaml") }} to get a fully functional OCaml with C toolchain.
ocaml_compiler:
  - ocaml-compiler

cross_target_platform_:
  - linux-64
  - linux-aarch64
  - linux-ppc64le
  - osx-64
  - osx-arm64
  - win-64
